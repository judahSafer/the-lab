<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Safer.Global — Logo Clean</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000010;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shield-static {
      position: absolute;
      width: 210px;
      height: 210px;
      animation: shield-breathe 3s ease-in-out infinite;
    }

    @keyframes shield-breathe {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(0,212,255,0.4)) drop-shadow(0 0 35px rgba(0,212,255,0.2)); }
      50%       { filter: drop-shadow(0 0 28px rgba(0,212,255,0.8)) drop-shadow(0 0 60px rgba(0,212,255,0.4)); }
    }

    .orb-inner {
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      animation: orb-breathe 3s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes orb-breathe {
      0%, 100% { opacity: 0.85; transform: scale(0.97); }
      50%       { opacity: 1;    transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img class="shield-static" src="logo-concept.svg" alt="shield"/>
    <img class="orb-inner" src="orb-transparent.png" alt="orb"/>
  </div>
</body>
</html>
