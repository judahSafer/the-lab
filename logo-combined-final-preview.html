<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Safer.Global — Logo + Wordmark</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000010;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .full-logo {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    /* Wordmark */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .w-safer {
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: 10px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.3);
      line-height: 1;
      animation: breathe 4s ease-in-out infinite;
    }

    .accent-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,212,255,0.35), transparent);
      margin: 6px 0;
    }

    .w-global {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 16px;
      color: #00d4ff;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0,212,255,0.6);
      animation: fade-breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { text-shadow: 0 0 14px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.3); }
      50%       { text-shadow: 0 0 24px rgba(0,212,255,0.9), 0 0 60px rgba(0,212,255,0.5); }
    }

    @keyframes fade-breathe {
      0%, 100% { opacity: 0.7; letter-spacing: 16px; }
      50%       { opacity: 1;   letter-spacing: 17px; }
    }

    /* Shield + orb */
    .logo-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shield-static {
      position: absolute;
      width: 150px;
      height: 150px;
      animation: shield-breathe 3s ease-in-out infinite;
    }

    @keyframes shield-breathe {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(0,212,255,0.4)) drop-shadow(0 0 35px rgba(0,212,255,0.2)); }
      50%       { filter: drop-shadow(0 0 28px rgba(0,212,255,0.8)) drop-shadow(0 0 60px rgba(0,212,255,0.4)); }
    }

    .orb-inner {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      animation: orb-breathe 3s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes orb-breathe {
      0%, 100% { opacity: 0.85; transform: scale(0.97); }
      50%       { opacity: 1;    transform: scale(1.03); }
    }
  </style>
</head>
<body>

  <div class="full-logo">

    <div class="logo-wrap">
      <img class="shield-static" src="logo-concept.svg" alt="shield"/>
      <img class="orb-inner" src="orb-transparent.png" alt="orb"/>
    </div>

    <div class="wordmark">
      <div class="w-safer">SAFER</div>
      <div class="accent-line"></div>
      <div class="w-global">.GLOBAL</div>
    </div>

  </div>

</body>
</html>
