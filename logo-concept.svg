<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>

    <!-- Orb core glow (Yoni's original feel) -->
    <radialGradient id="orbCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%"  stop-color="#a0d4ff" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#2196f3" stop-opacity="0.85"/>
      <stop offset="80%"  stop-color="#0d47a1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000820" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer orb glow -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#0d47a1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000820" stop-opacity="0"/>
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#2196f3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Shield inner fill -->
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000510" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Glow filter for shield -->
    <filter id="shieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for orb -->
    <filter id="orbFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse ring filter -->
    <filter id="pulseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to shield shape -->
    <clipPath id="shieldClip">
      <path d="M256 60 L390 110 L390 260 C390 340 330 400 256 430 C182 400 122 340 122 260 L122 110 Z"/>
    </clipPath>
  </defs>

  <!-- Background removed for transparency -->


  <!-- Shield body fill -->
  <path d="M256 60 L390 110 L390 260 C390 340 330 400 256 430 C182 400 122 340 122 260 L122 110 Z"
    fill="url(#shieldInner)"/>

  <!-- Orb glow behind (large, soft — Yoni's orb) -->
  <ellipse cx="256" cy="245" rx="105" ry="105"
    fill="url(#orbGlow)"
    filter="url(#orbFilter)"
    clip-path="url(#shieldClip)"/>

  <!-- Orb core (bright center) -->
  <ellipse cx="256" cy="245" rx="62" ry="62"
    fill="url(#orbCore)"
    filter="url(#orbFilter)"
    clip-path="url(#shieldClip)"/>

  <!-- Shield border (glowing outline) -->
  <path d="M256 60 L390 110 L390 260 C390 340 330 400 256 430 C182 400 122 340 122 260 L122 110 Z"
    fill="none"
    stroke="url(#shieldGrad)"
    stroke-width="3.5"
    filter="url(#shieldGlow)"/>

  <!-- Shield inner highlight (top left edge) -->
  <path d="M256 75 L375 120 L375 260 C375 332 320 388 256 415"
    fill="none"
    stroke="#00d4ff"
    stroke-width="1.2"
    stroke-opacity="0.4"
    stroke-linecap="round"/>

  <!-- AI dot grid inside orb (subtle tech feel) -->
  <g clip-path="url(#shieldClip)" opacity="0.25">
    <circle cx="220" cy="210" r="2" fill="#00d4ff"/>
    <circle cx="256" cy="200" r="2" fill="#00d4ff"/>
    <circle cx="292" cy="210" r="2" fill="#00d4ff"/>
    <circle cx="205" cy="245" r="2" fill="#00d4ff"/>
    <circle cx="307" cy="245" r="2" fill="#00d4ff"/>
    <circle cx="220" cy="280" r="2" fill="#00d4ff"/>
    <circle cx="256" cy="290" r="2" fill="#00d4ff"/>
    <circle cx="292" cy="280" r="2" fill="#00d4ff"/>
    <!-- connecting lines -->
    <line x1="220" y1="210" x2="256" y2="200" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="256" y1="200" x2="292" y2="210" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="220" y1="210" x2="205" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="292" y1="210" x2="307" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="205" y1="245" x2="220" y2="280" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="307" y1="245" x2="292" y2="280" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="220" y1="280" x2="256" y2="290" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="256" y1="290" x2="292" y2="280" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="220" y1="210" x2="256" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="292" y1="210" x2="256" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="220" y1="280" x2="256" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="292" y1="280" x2="256" y2="245" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
  </g>

</svg>
